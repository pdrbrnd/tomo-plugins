name: Build registry

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/build-registry.mjs"
      - ".github/workflows/build-registry.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate registry.json
        run: node scripts/build-registry.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- registry.json; then
            echo "registry.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: regenerate registry.json"
          git push
